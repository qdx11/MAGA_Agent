tools:
  - name: ExcelStructureParser
    group: excel
    description: "엑셀 파일의 전체 구조를 파악합니다 (시트, 병합셀, 메모, 데이터 범위). xls/xlsx 자동 감지, DRM 감지 포함. 반환된 row_index를 LLM이 직접 분석하여 header_rows, data_start_row, table_type, id_col_count를 결정해야 함."
    prerequisites: []
    retry_strategies:
      - adjust_parameters
    required_permissions:
      - excel:read
    entry_point: "enterprise_agent.tools.excel.structure_parser:excel_structure_parser"

  - name: CrossTableFlattener
    group: excel
    description: "크로스테이블 형태의 엑셀 데이터를 DB형(행-열 정규화)으로 변환합니다. source_cell 추적 포함. ExcelStructureParser 실행 후 LLM이 결정한 header_rows, data_start_row, id_col_count를 직접 파라미터로 전달해야 함."
    prerequisites:
      - ExcelStructureParser
    retry_strategies:
      - adjust_parameters
    required_permissions:
      - excel:read
    entry_point: "enterprise_agent.tools.excel.crosstable_flattener:crosstable_flattener"

  - name: OutlierDetector
    group: excel
    description: "수치 데이터에서 IQR/Z-score 방식으로 이상값을 감지합니다. source_cell로 원본 위치 역추적 가능."
    prerequisites:
      - ExcelStructureParser
      - CrossTableFlattener
    retry_strategies:
      - adjust_parameters
      - aggregate_only
    required_permissions:
      - excel:read
    entry_point: "enterprise_agent.tools.excel.analysis_tools:outlier_detector"

  - name: ExcelCompareTool
    group: excel
    description: "두 엑셀 파일의 변경사항을 비교합니다 (추가/삭제된 행, 변경된 셀)."
    prerequisites: []
    retry_strategies:
      - adjust_parameters
    required_permissions:
      - excel:read
    entry_point: "enterprise_agent.tools.excel.analysis_tools:excel_compare_tool"

  - name: DynamoDBListTables
    group: mes
    description: "사내 DynamoDB에 등록된 테이블 목록과 검색 가능한 컬럼 정보를 조회합니다. 어떤 테이블을 써야 할지 모를 때 먼저 호출."
    prerequisites: []
    retry_strategies: []
    required_permissions:
      - mes:query
    entry_point: "enterprise_agent.tools.mes.dynamodb_search:list_available_tables"

  - name: DynamoDBSearch
    group: mes
    description: "사내 DynamoDB 테이블을 검색합니다. table_name(필수), conditions(선택), hours(선택). 시간 범위가 있는 테이블은 자동으로 기본 시간 조건 적용."
    prerequisites:
      - DynamoDBListTables
    retry_strategies:
      - adjust_parameters
    required_permissions:
      - mes:query
    entry_point: "enterprise_agent.tools.mes.dynamodb_search:dynamodb_search"

  - name: MESQueryTool
    group: mes
    description: "사내 MES에서 생산/품질 데이터를 조회합니다. 날짜 범위 필수 (최대 90일)."
    prerequisites: []
    retry_strategies:
      - adjust_parameters
    required_permissions:
      - mes:query
    entry_point: "enterprise_agent.tools.mes.mock_tools:mes_query_tool"

  - name: MESDataFormatter
    group: mes
    description: "MES 조회 결과를 분석용 포맷으로 정제하고 집계합니다."
    prerequisites:
      - MESQueryTool
    retry_strategies:
      - adjust_parameters
    required_permissions:
      - mes:query
    entry_point: "enterprise_agent.tools.mes.mock_tools:mes_data_formatter"

  - name: DatabaseTableReader
    group: excel
    description: "일반 DB형(행-열) 구조 엑셀을 레코드 리스트로 읽습니다. 크로스테이블이 아닌 일반 보고서/조회 테이블에 사용. ExcelStructureParser 후 LLM이 결정한 header_rows, data_start_row를 직접 전달."
    prerequisites:
      - ExcelStructureParser
    retry_strategies:
      - adjust_parameters
    required_permissions:
      - excel:read
    entry_point: "enterprise_agent.tools.excel.database_reader:database_table_reader"

  - name: ExcelRangeReader
    group: excel
    description: "엑셀의 특정 행/열 범위만 정밀하게 읽습니다. LLM이 구조 파악 후 필요한 범위를 지정해서 호출."
    prerequisites:
      - ExcelStructureParser
    retry_strategies:
      - adjust_parameters
    required_permissions:
      - excel:read
    entry_point: "enterprise_agent.tools.excel.structure_parser:excel_range_reader"
