tools:
  - name: ExcelStructureParser
    group: excel
    description: "엑셀 파일의 시트/행/열 구조를 파악합니다."
    prerequisites: []
    retry_strategies:
      - adjust_parameters
    entry_point: "enterprise_agent.tools.excel.structure_parser:excel_structure_parser"

  - name: HeaderDetector
    group: excel
    description: "엑셀 시트에서 헤더 행/멀티헤더 정보를 감지합니다."
    prerequisites:
      - ExcelStructureParser
    retry_strategies:
      - adjust_parameters
    entry_point: "enterprise_agent.tools.excel.header_detector:header_detector"

  - name: CrossTableFlattener
    group: excel
    description: "크로스테이블을 행 기반 테이블로 평탄화합니다."
    prerequisites:
      - ExcelStructureParser
      - HeaderDetector
    retry_strategies:
      - adjust_parameters
    entry_point: "enterprise_agent.tools.excel.crosstable_flattener:crosstable_flattener"

  - name: OutlierDetector
    group: excel
    description: "수치 데이터에서 이상값을 감지합니다."
    prerequisites:
      - ExcelStructureParser
    retry_strategies:
      - adjust_parameters
      - aggregate_only
    entry_point: "enterprise_agent.tools.excel.outlier_detector:outlier_detector"

  - name: ExcelCompareTool
    group: excel
    description: "두 엑셀 버전 간 추가/삭제/변경 내역을 비교합니다."
    prerequisites: []
    retry_strategies:
      - adjust_parameters
    entry_point: "enterprise_agent.tools.excel.compare_tool:excel_compare_tool"
